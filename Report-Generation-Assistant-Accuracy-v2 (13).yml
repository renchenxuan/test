    - data:
        code: "import json\nimport re\n\ndef _clean_text(text):\n    if text is None:\n\
          \        return ''\n    if isinstance(text, dict):\n        return json.dumps(text,\
          \ ensure_ascii=False)\n    s = str(text).strip()\n    if not s:\n      \
          \  return ''\n    s = re.sub(r'(?is)<\\s*/?\\s*think\\s*>', '', s).strip()\n\
          \    s = re.sub(r'(?is)^```(?:json)?\\s*', '', s)\n    s = re.sub(r'(?is)\\\
          s*```$', '', s).strip()\n    return s\n\ndef _extract_json_object(text):\n\
          \    s = _clean_text(text)\n    if not s:\n        return ''\n    try:\n\
          \        json.loads(s)\n        return s\n    except Exception:\n      \
          \  pass\n    start = s.find('{')\n    if start < 0:\n        return ''\n\
          \    depth = 0\n    in_str = False\n    esc = False\n    for i, ch in enumerate(s[start:],\
          \ start=start):\n        if in_str:\n            if esc:\n             \
          \   esc = False\n            elif ch == '\\\\':\n                esc = True\n\
          \            elif ch == '\"':\n                in_str = False\n        \
          \    continue\n        if ch == '\"':\n            in_str = True\n     \
          \   elif ch == '{':\n            depth += 1\n        elif ch == '}':\n \
          \           depth -= 1\n            if depth == 0:\n                return\
          \ s[start:i + 1]\n    return ''\n\ndef _parse(text):\n    if isinstance(text,\
          \ dict):\n        return text\n    candidate = _extract_json_object(text)\n\
          \    if not candidate:\n        return {}\n    try:\n        parsed = json.loads(candidate)\n\
          \        return parsed if isinstance(parsed, dict) else {}\n    except Exception:\n\
          \        return {}\n\ndef main(n6_text: str = '') -> dict:\n    raw = _parse(n6_text)\n\
          \    table = raw.get('five_why_table', []) if isinstance(raw, dict) else\
          \ []\n    warnings = []\n    sanitized = []\n    expected = 1\n    for item\
          \ in table:\n        if not isinstance(item, dict):\n            warnings.append('five_why_table\
          \ 存在非对象条目，已忽略。')\n            continue\n        idx = item.get('question_index')\n\
          \        try:\n            idx = int(idx)\n        except Exception:\n \
          \           idx = expected\n            warnings.append('question_index\
          \ 非数字，已按顺序重排。')\n        if idx != expected:\n            warnings.append(f'question_index\
          \ 非递增（期望 {expected}，实际 {idx}），已重排。')\n            idx = expected\n     \
          \   q = str(item.get('question', '')).strip() or '【证据不足】问题需人工补充。'\n    \
          \    a = str(item.get('analysis', '')).strip() or '【证据不足】分析需人工补充。'\n   \
          \     sanitized.append({'question_index': idx, 'question': q, 'analysis':\
          \ a})\n        expected += 1\n        if expected > 5:\n            break\n\
          \n    while len(sanitized) < 5:\n        i = len(sanitized) + 1\n      \
          \  sanitized.append({\n            'question_index': i,\n            'question':\
          \ '【证据不足】问题需人工补充。',\n            'analysis': '【证据不足】分析需人工补充。'\n        })\n\
          \        warnings.append('5Y 项不足 5 层，已补齐占位。')\n\n    out = {\n        'five_why_table':\
          \ sanitized,\n        'evidence_citation': raw.get('evidence_citation',\
          \ []) if isinstance(raw, dict) else []\n    }\n    return {\n        'validated_five_why_text':\
          \ json.dumps(out, ensure_ascii=False),\n        'five_why_validation_warnings':\
          \ warnings\n    }"
