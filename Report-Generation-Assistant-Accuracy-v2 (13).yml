    - data:
        code: "import re\n\nACTION_WORDS = ['更换', '复位', '重启', '校准', '紧固', '清洁', '回退',\
          \ '升级', '调整', '维修', '修复', '处理']\nCONDITION_WORDS = ['上电', '并网', '满载', '轻载',\
          \ '高温', '低温', '潮湿', '间歇', '夜间', '白天', '雨天']\nDIAGNOSIS_STOPWORDS = ['排查步骤',\
          \ '临时措施', '纠正措施', '预防措施', '解决方案', '复位', '参数设置', '检查项', '注意事项']\n\n\ndef _to_text(v):\n\
          \    if v is None:\n        return ''\n    if isinstance(v, list):\n   \
          \     return ' '.join([str(x).strip() for x in v if str(x).strip()])\n \
          \   return str(v).strip()\n\n\ndef _split_terms(text):\n    s = _to_text(text)\n\
          \    if not s:\n        return []\n    chunks = re.split(r'[，,。；;、|/\\s]+',\
          \ s)\n    return [x.strip() for x in chunks if x and x.strip()]\n\n\ndef\
          \ _join_unique(items):\n    out = []\n    seen = set()\n    for item in items:\n\
          \        s = str(item).strip()\n        if not s:\n            continue\n\
          \        key = s.lower()\n        if key in seen:\n            continue\n\
          \        seen.add(key)\n        out.append(s)\n    return out\n\n\ndef _contains_any(text,\
          \ words):\n    s = _to_text(text)\n    return any(w in s for w in words)\n\
          \n\ndef _pick_action_terms(*sources):\n    terms = []\n    for src in sources:\n\
          \        for t in _split_terms(src):\n            if _contains_any(t, ACTION_WORDS):\n\
          \                terms.append(t)\n    return _join_unique(terms)\n\n\ndef\
          \ _pick_condition_terms(*sources):\n    terms = []\n    for src in sources:\n\
          \        for t in _split_terms(src):\n            if _contains_any(t, CONDITION_WORDS):\n\
          \                terms.append(t)\n    return _join_unique(terms)\n\n\ndef\
          \ _clip_terms(items, n):\n    return [x for x in items if str(x).strip()][:n]\n\
          \n\ndef main(\n    normalized_fault_summary: str = '',\n    fault_description:\
          \ str = '',\n    fault_cause: str = '',\n    device_model: str = '',\n  \
          \  retrieval_keywords: list = None,\n    possible_parts: list = None,\n \
          \   possible_environment_factors: list = None\n) -> dict:\n    retrieval_keywords\
          \ = retrieval_keywords or []\n    possible_parts = possible_parts or []\n\
          \    possible_environment_factors = possible_environment_factors or []\n\n\
          \    diagnosis_base = _join_unique([\n        _to_text(device_model),\n \
          \       _to_text(fault_description),\n        _to_text(fault_cause),\n  \
          \      *[str(x) for x in retrieval_keywords[:6]],\n        *[str(x) for x\
          \ in possible_environment_factors[:3]]\n    ])\n    diagnosis_terms = [t\
          \ for t in diagnosis_base if not _contains_any(t, DIAGNOSIS_STOPWORDS)]\n\
          \    diagnosis_query = '；'.join(_clip_terms(diagnosis_terms, 8)) or _to_text(normalized_fault_summary)\n\
          \n    action_terms = _pick_action_terms(retrieval_keywords, fault_description,\
          \ fault_cause, possible_environment_factors)\n    if not action_terms:\n \
          \       action_terms = ['排查步骤', '复位', '参数设置', '检查项']\n\n    condition_terms\
          \ = _pick_condition_terms(fault_description, possible_environment_factors,\
          \ retrieval_keywords)\n    strict_terms = _join_unique([\n        _to_text(device_model),\n\
          \        *[str(x) for x in possible_parts[:4]],\n        *action_terms[:6],\n\
          \        *condition_terms[:4],\n        '恢复正常',\n        '告警消失',\n      \
          \  '波形回稳'\n    ])\n    solution_query_strict = '；'.join(_clip_terms(strict_terms,\
          \ 12)) + '；排查步骤；临时措施；纠正措施；预防措施；复位；参数设置'\n\n    broad_terms = _join_unique([\n\
          \        _to_text(device_model),\n        _to_text(normalized_fault_summary),\n\
          \        *[str(x) for x in retrieval_keywords],\n        *[str(x) for x in\
          \ possible_parts],\n        *[str(x) for x in possible_environment_factors],\n\
          \        '排查步骤',\n        '临时措施',\n        '纠正措施',\n        '预防措施',\n    \
          \    '复位',\n        '参数设置',\n        '检查项',\n        '注意事项'\n    ])\n    solution_query_broad\
          \ = '；'.join(_clip_terms(broad_terms, 14))\n\n    return {\n        'diagnosis_query':\
          \ diagnosis_query.strip('；'),\n        'solution_query_strict': solution_query_strict.strip('；'),\n\
          \        'solution_query_broad': solution_query_broad.strip('；')\n    }\n"
        code_language: python3
        desc: 构建双Query检索词（诊断+处置）
        outputs:
          diagnosis_query:
