    - data:
        code: "import json\nimport re\n\nDEFAULT_CONFIDENCE = 60\nLOW_EVIDENCE_MAX_CONFIDENCE\
          \ = 40\nLOW_INPUT_QUALITY_MAX_CONFIDENCE = 35\nCITATION_DEFAULT_CLAIM =\
          \ '未命名结论'\nCITATION_DEFAULT_SOURCE = '未知来源'\nCITATION_DEFAULT_QUOTE = '未提供引用片段'\n\
          CITATION_FALLBACK = [{'claim': '用户输入事实', 'source': 'fact_summary', 'quote':\
          \ '用户输入事实'}]\n\ndef _clean_text(text):\n    if text is None:\n        return\
          \ ''\n    if isinstance(text, dict):\n        return json.dumps(text, ensure_ascii=False)\n\
          \    s = str(text).strip()\n    if not s:\n        return ''\n    s = re.sub(r'(?is)<\\\
          s*/?\\s*think\\s*>', '', s).strip()\n    s = re.sub(r'(?is)^```(?:json)?\\\
          s*', '', s)\n    s = re.sub(r'(?is)\\s*```$', '', s).strip()\n    return\
          \ s\n\ndef _extract_json_object(text):\n    s = _clean_text(text)\n    if\
          \ not s:\n        return ''\n    try:\n        json.loads(s)\n        return\
          \ s\n    except Exception:\n        pass\n    start = s.find('{')\n    if\
          \ start < 0:\n        return ''\n    depth = 0\n    in_str = False\n   \
          \ esc = False\n    for i, ch in enumerate(s[start:], start=start):\n   \
          \     if in_str:\n            if esc:\n                esc = False\n   \
          \         elif ch == '\\\\':\n                esc = True\n            elif\
          \ ch == '\"':\n                in_str = False\n            continue\n  \
          \      if ch == '\"':\n            in_str = True\n        elif ch == '{':\n\
          \            depth += 1\n        elif ch == '}':\n            depth -= 1\n\
          \            if depth == 0:\n                return s[start:i + 1]\n   \
          \ return ''\n\ndef _parse_json(text, fallback):\n    try:\n        if isinstance(text,\
          \ dict):\n            return text\n        candidate = _extract_json_object(text)\n\
          \        if not candidate:\n            return fallback\n        parsed\
          \ = json.loads(candidate)\n        return parsed if isinstance(parsed, dict)\
          \ else fallback\n    except (json.JSONDecodeError, TypeError, ValueError):\n\
          \        return fallback\n\ndef _ensure_list(v):\n    if isinstance(v, list):\n\
          \        return v\n    if v is None:\n        return []\n    return [v]\n\
          \ndef _normalize_confidence(v):\n    corrected = False\n    score = DEFAULT_CONFIDENCE\n\
          \    try:\n        if isinstance(v, str):\n            score = round(float(v.strip()))\n\
          \        else:\n            score = round(float(v))\n    except (ValueError,\
          \ TypeError):\n        score = DEFAULT_CONFIDENCE\n        corrected = True\n\
          \    bounded = max(0, min(100, score))\n    if bounded != score:\n     \
          \   corrected = True\n    return bounded, corrected\n\ndef _looks_like_filename(text):\n\
          \    s = str(text).strip()\n    if not s:\n        return True\n    if len(s)\
          \ <= 200 and re.search(r'\\.(txt|md|pdf|docx?|xlsx?|pptx?)$', s, re.IGNORECASE):\n\
          \        return True\n    if len(s) <= 200 and (('/' in s) or ('\\\\' in\
          \ s)):\n        return True\n    return False\n\ndef _normalize_quote(value):\n\
          \    s = str(value).strip()\n    if (not s) or _looks_like_filename(s):\n\
          \        return '未找到直接支持文本'\n    if re.search(r'(?i)\\bmetadata\\.', s):\n\
          \        return '未找到直接支持文本'\n    if re.search(r'(?i)\\b(document_name|dataset_id|segment_id|retriever_from|child_chunks\\\
          .)\\b', s):\n        return '未找到直接支持文本'\n    return s[:200]\n\ndef _normalize_citations(values):\n\
          \    out = []\n    for item in _ensure_list(values):\n        if isinstance(item,\
          \ dict):\n            claim = str(item.get('claim', '')).strip() or CITATION_DEFAULT_CLAIM\n\
          \            source = str(item.get('source', '')).strip() or CITATION_DEFAULT_SOURCE\n\
          \            quote = _normalize_quote(item.get('quote', ''))\n         \
          \   out.append({'claim': claim, 'source': source, 'quote': quote})\n   \
          \     else:\n            s = str(item).strip()\n            if s:\n    \
          \            out.append({'claim': s, 'source': CITATION_DEFAULT_SOURCE,\
          \ 'quote': _normalize_quote(s)})\n    return out\n\ndef _dedupe_citations(values):\n\
          \    out = []\n    seen = set()\n    for item in _ensure_list(values):\n\
          \        if not isinstance(item, dict):\n            continue\n        claim\
          \ = str(item.get('claim', '')).strip()\n        source = str(item.get('source',\
          \ '')).strip()\n        quote = str(item.get('quote', '')).strip()\n   \
          \     key = (claim, source, quote)\n        if key in seen:\n          \
          \  continue\n        seen.add(key)\n        out.append({'claim': claim,\
          \ 'source': source, 'quote': quote})\n    return out\n\ndef main(\n    report_id:\
          \ str,\n    customer_name: str,\n    site_name: str,\n    device_model:\
          \ str,\n    device_sn: str,\n    fault_time: str,\n    fault_count: int,\n\
          \    fault_description: str,\n    missing_required_fields: list,\n    history_cases_snippets:\
