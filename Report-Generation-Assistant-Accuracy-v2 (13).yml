          \ s)\n    return s.strip()\n\ndef _clean_chunk(text):\n    s = _strip_html(text)\n\
          \    kept = []\n    for line in s.splitlines():\n        t = line.strip()\n\
          \        if not t:\n            continue\n        if re.match(r'(?i)^metadata(\\\
          .|:)', t):\n            continue\n        if re.match(r'(?i)^(dataset_id|document_id|segment_id|segment_position|segment_word_count|score|position|retriever_from)\\\
          b', t):\n            continue\n        kept.append(t)\n    s = '\\n'.join(kept)\n\
          \    s = re.sub(r'\\n{3,}', '\\n\\n', s)\n    return s.strip()\n\ndef _extract_evidence_texts(v):\n\
          \    out = []\n    if v is None:\n        return out\n    if isinstance(v,\
          \ list):\n        for item in v:\n            out.extend(_extract_evidence_texts(item))\n\
          \        return out\n    if isinstance(v, dict):\n        title = v.get('title')\
          \ or v.get('document_name')\n        if isinstance(title, (str, int, float)):\n\
          \            t = _clean_chunk(title)\n            if t:\n              \
