          \ str,\n    product_retrieval_status: str,\n    history_retrieval_notes:\
          \ list,\n    product_retrieval_notes: list,\n    n5_text: str,\n    n6_text:\
          \ str,\n    n6_validated_text: str,\n    n7_text: str,\n    n8_text: str,\n\
          \    n9_text: str,\n    consistency_warnings: list,\n    input_quality_score:\
          \ int = 100,\n    input_quality_level: str = 'high',\n    input_quality_issues:\
          \ list = None,\n    input_quality_recommendation: str = '',\n    input_quality_should_proceed:\
          \ bool = True\n) -> dict:\n    citation_fallback = CITATION_FALLBACK\n\n\
          \    n5 = _parse_json(n5_text, {\n        'customer_letter': '【证据不足】需人工补充。',\n\
          \        'problem_description_refined': fault_description,\n        'evidence_citation':\
          \ citation_fallback\n    })\n    n6 = _parse_json(n6_validated_text or n6_text,\
          \ {\n        'five_why_table': [],\n        'evidence_citation': citation_fallback\n\
          \    })\n    n7 = _parse_json(n7_text, {\n        'root_cause_summary':\
          \ '【证据不足】需人工审核。',\n        'responsibility_judgement': '【证据不足】【待人工审核】仅建议责任方向。',\n\
          \        'audit_metrics': {\n            'evidence_sufficiency': '低',\n\
          \            'responsibility_confidence': DEFAULT_CONFIDENCE,\n        \
          \    'risk_tips': ['根因与责任节点输出解析失败，已使用兜底。'],\n            'hallucination_check':\
          \ '疑似'\n        },\n        'evidence_citation': citation_fallback\n   \
          \ })\n    n8 = _parse_json(n8_text, {\n        'temporary_measures': '【证据不足】需人工补充。',\n\
          \        'corrective_actions': '【证据不足】需人工补充。',\n        'preventive_actions':\
          \ '【证据不足】需人工补充。',\n        'customer_side_actions': '【证据不足】需人工补充。',\n  \
          \      'internal_quality_actions': '【证据不足】需人工补充。',\n        'evidence_citation':\
          \ citation_fallback\n    })\n    n9 = _parse_json(n9_text, {})\n\n    audit_metrics_raw\
          \ = n7.get('audit_metrics', {}) if isinstance(n7, dict) else {}\n    audit_metrics\
          \ = audit_metrics_raw if isinstance(audit_metrics_raw, dict) else {}\n \
          \   audit_metrics.setdefault('evidence_sufficiency', '中')\n    audit_metrics.setdefault('responsibility_confidence',\
          \ DEFAULT_CONFIDENCE)\n    audit_metrics.setdefault('risk_tips', [])\n \
          \   audit_metrics.setdefault('hallucination_check', '无')\n    audit_metrics['risk_tips']\
          \ = [str(x) for x in _ensure_list(audit_metrics.get('risk_tips', []))]\n\
          \n    normalized_score, corrected = _normalize_confidence(audit_metrics.get('responsibility_confidence'))\n\
          \    if str(audit_metrics.get('evidence_sufficiency')) == '低' and normalized_score\
          \ > LOW_EVIDENCE_MAX_CONFIDENCE:\n        normalized_score = LOW_EVIDENCE_MAX_CONFIDENCE\n\
          \        audit_metrics['risk_tips'].append(f'evidence_sufficiency=低，responsibility_confidence\
          \ 已按上限 {LOW_EVIDENCE_MAX_CONFIDENCE} 限制。')\n    audit_metrics['responsibility_confidence']\
          \ = normalized_score\n    if corrected:\n        audit_metrics['risk_tips'].append('responsibility_confidence\
          \ 非法或越界，已自动校正到 0~100 整数范围。')\n\n    if history_retrieval_status in ('failed',\
          \ 'no_knowledge_base', 'empty') or product_retrieval_status in ('failed',\
          \ 'no_knowledge_base', 'empty'):\n        audit_metrics['risk_tips'].append('检索证据不足：知识库检索失败或未命中，仅基于输入事实。')\n\
          \n    if missing_required_fields:\n        audit_metrics['risk_tips'].append('核心字段缺失：'\
          \ + ', '.join(missing_required_fields))\n\n    if str(input_quality_level).strip()\
          \ in ('low', 'critical'):\n        audit_metrics['risk_tips'].append(f'输入质量等级为{input_quality_level}，建议人工重点复核。')\n\
          \        if normalized_score > LOW_INPUT_QUALITY_MAX_CONFIDENCE:\n     \
          \       normalized_score = LOW_INPUT_QUALITY_MAX_CONFIDENCE\n          \
          \  audit_metrics['responsibility_confidence'] = normalized_score\n     \
          \       audit_metrics['risk_tips'].append(\n                f'输入质量较低，responsibility_confidence\
          \ 已按上限 {LOW_INPUT_QUALITY_MAX_CONFIDENCE} 限制。'\n            )\n\n    if\
          \ not bool(input_quality_should_proceed):\n        audit_metrics['risk_tips'].append('输入质量门控建议暂停自动生成并转人工处理。')\n\
          \n    for issue in _ensure_list(input_quality_issues):\n        issue_text\
          \ = str(issue).strip()\n        if issue_text:\n            audit_metrics['risk_tips'].append('输入质量问题：'\
          \ + issue_text)\n\n    if str(input_quality_recommendation).strip():\n \
          \       audit_metrics['risk_tips'].append('输入质量建议：' + str(input_quality_recommendation).strip())\n\
          \n    for tip in _ensure_list(consistency_warnings):\n        if str(tip).strip():\n\
          \            audit_metrics['risk_tips'].append(str(tip).strip())\n\n   \
          \ sections = {\n        'customer_letter': n9.get('customer_letter', n5.get('customer_letter',\
          \ '【证据不足】需人工补充。')),\n        'problem_description_refined': n9.get('problem_description_refined',\
          \ n5.get('problem_description_refined', fault_description)),\n        'five_why_table':\
          \ n9.get('five_why_table', n6.get('five_why_table', [])),\n        'root_cause_summary':\
          \ n9.get('root_cause_summary', n7.get('root_cause_summary', '【证据不足】需人工审核。')),\n\
          \        'responsibility_judgement': n9.get('responsibility_judgement',\
          \ n7.get('responsibility_judgement', '【证据不足】【待人工审核】仅建议责任方向。')),\n      \
          \  'temporary_measures': n9.get('temporary_measures', n8.get('temporary_measures',\
          \ '【证据不足】需人工补充。')),\n        'corrective_actions': n9.get('corrective_actions',\
