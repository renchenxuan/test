        code: "import re\n\nACTION_HINTS = ['排查', '措施', '复位', '参数', '更换', '校准', '检查',\
          \ '临时', '纠正', '预防', '处理']\n\n\ndef _collect_texts(v, out):\n    if v is None:\n\
          \        return\n    if isinstance(v, list):\n        for item in v:\n  \
          \          _collect_texts(item, out)\n        return\n    if isinstance(v,\
          \ dict):\n        for key in ('title', 'document_name', 'content'):\n   \
          \         val = v.get(key)\n            if isinstance(val, (str, int, float)):\n\
          \                s = str(val).strip()\n                if s:\n           \
          \         out.append(s)\n        for key in ('child_chunks', 'result', 'records',\
          \ 'data', 'documents', 'segments'):\n            if key in v:\n         \
          \       _collect_texts(v.get(key), out)\n        return\n    s = str(v).strip()\n\
          \    if s:\n        out.append(s)\n\n\ndef _dedupe(items, limit=200):\n  \
          \  seen = set()\n    out = []\n    for x in items:\n        s = str(x).strip()\n\
          \        if not s:\n            continue\n        key = s.lower()\n      \
          \  if key in seen:\n            continue\n        seen.add(key)\n       \
          \ out.append(s)\n        if len(out) >= limit:\n            break\n    return\
          \ out\n\n\ndef _tokens(text):\n    parts = re.split(r'[，,。；;、|/\\s]+', str(text))\n\
          \    return {p.strip().lower() for p in parts if p and p.strip()}\n\n\ndef\
          \ _contains_action_hint(text):\n    s = str(text)\n    return any(w in s\
          \ for w in ACTION_HINTS)\n\n\ndef _is_novel(candidate, primary_items, overlap_threshold=0.72):\n\
          \    cand = _tokens(candidate)\n    if not cand:\n        return False\n \
          \   for p in primary_items:\n        base = _tokens(p)\n        if not base:\n\
          \            continue\n        overlap = len(cand & base) / max(len(cand),\
          \ 1)\n        if overlap >= overlap_threshold:\n            return False\n\
          \    return True\n\n\ndef _merge_dual_query(primary_result=None, secondary_result=None):\n\
          \    primary_texts = []\n    secondary_texts = []\n    _collect_texts(primary_result,\
          \ primary_texts)\n    _collect_texts(secondary_result, secondary_texts)\n\n\
          \    primary_unique = _dedupe(primary_texts, limit=160)\n    secondary_unique\
          \ = _dedupe(secondary_texts, limit=200)\n\n    secondary_action = []\n   \
          \ secondary_novel = []\n    for s in secondary_unique:\n        if not _is_novel(s,\
          \ primary_unique):\n            continue\n        if _contains_action_hint(s):\n\
          \            secondary_action.append(s)\n        else:\n            secondary_novel.append(s)\n\
          \n    merged_result = _dedupe(primary_unique + secondary_action + secondary_novel,\
          \ limit=200)\n    return {\n        'merged_result': merged_result,\n    \
          \    'primary_hits': len(primary_unique),\n        'secondary_hits': len(secondary_unique)\n\
          \    }\n\n\ndef main(\n    filtered_primary_result=None,\n    filtered_secondary_result=None,\n\
          \    fallback_primary_result=None,\n    fallback_secondary_result=None,\n \
          \   primary_query: str = '',\n    secondary_query: str = '',\n    min_filtered_hits:\
          \ int = 2\n) -> dict:\n    filtered = _merge_dual_query(filtered_primary_result,\
          \ filtered_secondary_result)\n    fallback = _merge_dual_query(fallback_primary_result,\
          \ fallback_secondary_result)\n\n    threshold = int(min_filtered_hits) if str(min_filtered_hits).strip()\
          \ else 2\n    use_filtered = len(filtered.get('merged_result', [])) >= max(1,\
          \ threshold)\n\n    selected = filtered if use_filtered else fallback\n   \
          \ mode_label = 'device_model过滤命中' if use_filtered else '过滤命中不足，降级到无过滤兜底'\n\
          \n    merged_query = (\n        '主查询: ' + str(primary_query).strip() +\n  \
          \      ' | 补充查询: ' + str(secondary_query).strip() +\n        ' | 合并策略: 诊断优先+处置增量'\
          \ +\n        ' | 路由: ' + mode_label +\n        f\" | 过滤路命中: {len(filtered.get('merged_result',\
          \ []))}\" +\n        f\" | 兜底路命中: {len(fallback.get('merged_result', []))}\"\n\
          \    )\n\n    return {\n        'merged_result': selected.get('merged_result',\
          \ []),\n        'merged_query': merged_query\n    }\n"
