          \ if isinstance(content, (str, int, float)):\n            t = _clean_chunk(content)\n\
          \            if t:\n                out.append(t)\n\n        child = v.get('child_chunks')\n\
          \        if isinstance(child, list):\n            for c in child:\n    \
          \            if isinstance(c, dict) and ('content' in c):\n            \
          \        t = _clean_chunk(c.get('content', ''))\n                    if\
          \ t:\n                        out.append(t)\n        elif isinstance(child,\
          \ dict):\n            t = _clean_chunk(child.get('content', ''))\n     \
