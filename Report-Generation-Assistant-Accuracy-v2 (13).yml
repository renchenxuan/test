          \ in seen:\n            continue\n        seen.add(s)\n        out.append(s)\n\
          \    return out\n\ndef _merge_snippets(snippets, max_chars=12000):\n   \
          \ merged = []\n    total = 0\n    for s in snippets:\n        piece = str(s).strip()\n\
          \        if not piece:\n            continue\n        extra = len(piece)\
          \ + (2 if merged else 0)\n        if total + extra > max_chars:\n      \
          \      break\n        merged.append(piece)\n        total += extra\n   \
          \ return '\\n\\n'.join(merged).strip()\n\ndef main(knowledge_result=None,\
          \ retrieval_query: str = '') -> dict:\n    snippets = _dedupe(_extract_evidence_texts(knowledge_result))\n\
          \    merged = _merge_snippets(snippets)\n    merged_snippets = [merged]\
