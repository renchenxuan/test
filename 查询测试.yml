    - data:
        code: "\ndef main(arg1: str):\n    \"\"\"\n    解析输入的字符串数组，返回两个单独的知识库参数\n    \n    Args:\n        arg1: 字符串格式的数组，如 \"[\\\"学术论文知识库\\\", \\\"技术报告知识库\\\"]\"\n    \n    Returns:\n        包含两个解析后参数的字典\n    \"\"\"\n    import json\n    \n    # 初始化返回结果\n    result = {\n        \"supporting_kb1\": \"\",\n        \"supporting_kb2\": \"\"  \n    }\n    \n    try:\n        # 如果输入为空或None，直接返回空结果\n        if not arg1:\n            return result\n        \n        # 解析JSON字符串\n        knowledge_bases = json.loads(arg1)\n        \n        # 确保解析结果是列表类型\n        if not isinstance(knowledge_bases, list):\n            return result\n        \n        # 根据列表长度赋值\n        if len(knowledge_bases) >= 1:\n            result[\"supporting_kb1\"] = knowledge_bases[0]\n        \n        if len(knowledge_bases) >= 2:\n            result[\"supporting_kb2\"] = knowledge_bases[1]\n            \n    except json.JSONDecodeError:\n        # JSON解析失败时的处理\n        print(f\"JSON解析失败: {arg1}\")\n    except Exception as e:\n        # 其他异常处理\n        print(f\"处理出错: {str(e)}\")\n    \n    return result\n"
