    - data:
        code: "import json\nimport re\n\ndef main(llm_text: str, resolved_query: str, retrieval_mode: str) -> dict:\n    \"\"\"\n    Parse Query Optimization LLM output.\n    Depending on retrieval_mode, pick the best query for downstream retrieval.\n    \"\"\"\n    optimized_query = resolved_query\n    search_keywords = \"\"\n\n    try:\n        json_match = re.search(r'\\{[^{}]*\\}', llm_text, re.DOTALL)\n        if json_match:\n            parsed = json.loads(json_match.group())\n            exact_terms = parsed.get(\"exact_terms\", \"\")\n            core_terms = parsed.get(\"core_terms\", \"\")\n            synonyms = parsed.get(\"synonyms\", \"\")\n            search_keywords = parsed.get(\"search_keywords\", \"\")\n            hybrid_query = parsed.get(\"hybrid_query\", \"\")\n\n            if \"es_recall_only\" in retrieval_mode:\n                optimized_query = search_keywords if search_keywords else resolved_query\n            elif \"vector_recall_only\" in retrieval_mode:\n                if hybrid_query:\n                    optimized_query = hybrid_query\n                else:\n                    optimized_query = resolved_query\n            else:\n                if hybrid_query:\n                    optimized_query = hybrid_query\n                elif search_keywords:\n                    optimized_query = resolved_query + \" \" + search_keywords\n                else:\n                    optimized_query = resolved_query\n    except Exception:\n        optimized_query = resolved_query\n\n    return {\n        \"optimized_query\": optimized_query,\n        \"search_keywords\": search_keywords\n    }\n"
        code_language: python3
        error_strategy: fail-branch
