    - data:
        code: "import json\n\ndef _extract_last_complete_json(s: str):\n    end =\
          \ len(s)\n    while end > 0:\n        last_close = s.rfind('}', 0, end)\n\
          \        if last_close == -1:\n            break\n        stack = 0\n  \
          \      for i in range(last_close, -1, -1):\n            if s[i] == '}':\n\
          \                stack += 1\n            elif s[i] == '{':\n           \
          \     stack -= 1\n                if stack == 0:\n                    return\
          \ s[i:last_close+1]\n        end = last_close\n    return None\n\ndef main(arg1:\
          \ str):\n    if not arg1 or not isinstance(arg1, str):\n        raise ValueError(\"\
          Input must be a non-empty string\")\n\n    candidate = _extract_last_complete_json(arg1)\n\
          \    if candidate is None:\n        raise ValueError(\"No valid JSON object\
          \ with required keys found\")\n\n    try:\n        data = json.loads(candidate)\n\
          \    except json.JSONDecodeError:\n        raise ValueError(\"No valid JSON\
          \ object with required keys found\")\n\n    if \"intent_type\" not in data:\n\
          \        raise ValueError(\"No valid JSON object with required keys found\"\
          )\n\n    # --- 解析 resolved_query ---\n    context_analysis = data.get(\"\
          context_analysis\", {})\n    if isinstance(context_analysis, str):\n   \
          \     try:\n            context_analysis = json.loads(context_analysis)\
          \ if context_analysis.strip() else {}\n        except:\n            context_analysis\
          \ = {}\n    if not isinstance(context_analysis, dict):\n        context_analysis\
          \ = {}\n    \n    resolved_query = context_analysis.get(\"resolved_query\"\
          )\n\n    # --- supporting_kbs → keep as JSON string (unchanged) ---\n  \
          \  raw_supporting = data.get(\"supporting_kbs\", [])\n    if isinstance(raw_supporting,\
          \ str):\n        try:\n            raw_supporting = json.loads(raw_supporting)\
          \ if raw_supporting.strip() else []\n        except:\n            raw_supporting\
          \ = []\n    if not isinstance(raw_supporting, list):\n        raw_supporting\
          \ = []\n    supporting_kbs_str = json.dumps(raw_supporting, ensure_ascii=False)\n\
          \n    # --- sub_intents → now output as native list of dicts (Array[Object])\
          \ ---\n    raw_sub_intents = data.get(\"sub_intents\", [])\n    if isinstance(raw_sub_intents,\
          \ str):\n        try:\n            raw_sub_intents = json.loads(raw_sub_intents)\
          \ if raw_sub_intents.strip() else []\n        except:\n            raw_sub_intents\
          \ = []\n    if not isinstance(raw_sub_intents, list):\n        raw_sub_intents\
          \ = []\n\n    cleaned_sub_intents = []\n    for sub in raw_sub_intents:\n\
          \        if not isinstance(sub, dict):\n            continue\n        #\
          \ Ensure inner supporting_kbs is a list (not string)\n        sub_supporting\
          \ = sub.get(\"supporting_kbs\", [])\n        if isinstance(sub_supporting,\
