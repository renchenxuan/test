              tokens = re.findall(r'[一-鿿]+|[A-Za-z][A-Za-z0-9_.-]*|\d+\.?\d*', normalized)
          
              def strip_particle(token: str) -> str:
                  return re.sub(r'(吗|呢|吧|啊|呀|嘛|么|哦|噢|哈|呐|哇)+$', '', token)
          
              filtered = []
              for t in tokens:
                  t = strip_particle(t.strip())
                  if not t:
                      continue
                  if t in STOP_WORDS:
                      continue
                  if len(t) == 1 and re.match(r'[一-鿿]', t):
                      continue
                  filtered.append(t)
          
              cleaned_query = ' '.join(filtered).strip()
              if not cleaned_query:
                  cleaned_query = original_query
          
              return {'cleaned_query': cleaned_query, 'original_query': original_query}
