          \n\n    # \U0001F680 工业级增强提示词（在你原模板基础上增强）\n    prompt_template = \"\"\"\
          ## ❗ 角色强约束（新增，必须遵守）\n你是“知识路由模块（Router）”，不是问答系统。\n\n你的唯一职责：\n- 意图识别\n- 知识库匹配\n\
