          \ - query_fragment: \"并网逆变器故障排查的标准步骤\"\n       - query_fragment: \"并网逆变器故障排查相关学术论文\"\
          \n     错误拆分（禁止）：\n       - query_fragment: \"标准步骤\"（丢失核心主题）\n       - query_fragment:\
          \ \"相关论文\"（丢失核心主题）\n\n4. **默认为知识查询**  \n   → 其他所有情况均为 `knowledge_query`。\n\
          \n## \U0001F9E0 知识库匹配规则（完全保留）\n### 主知识库（primary_kb）：\n- **绝不允许为 null**。若无法明确匹配，优先基于上下文主题继承；其次基于关键词推断最可能库。\n\
          \n### 辅助知识库（supporting_kbs）：\n- 推荐 0–2 个内容高度相关的库，需有逻辑关联（如“论文”→“技术报告”）。\n\
          - 不可无理由留空——有关联就推荐。\n\n### 召回模式（轻增强）\n- 按标题/编号/文档名精确查找已知资料 → `es_recall_only`（如\"\
          查GB/T 36558标准\"、\"找PCS-1000K手册\"）\n- 按主题/内容/语义查找相关资料或问方法/原理/原因 → `vector_recall_only`（如\"\
          并网逆变器故障排查相关论文\"、\"MPPT效率低怎么办\"）\n\n### 问题复杂度判断（complexity）\n判断为 `complex`\
          \ 的条件（满足任一即可）：\n- 涉及故障排查、报错处理、设备维修\n- 涉及多个系统/模块交互的问题\n- 涉及安全风险、高压操作、断电流程\n\
          - 需要排查步骤或因果推理的问题\n- 涉及多个故障现象同时出现\n其他情况（如查参数、查文档、查标准、简单概念解释）判断为 `simple`。\n\
          \n## \U0001F4CA 上下文分析要求（完全保留）\n请基于对话历史（如有）和当前查询，推断以下信息：\n- `original_query`：用户原始输入（即\
          \ \"{user_query}\"）\n- `resolved_query`：补全指代和省略后的完整查询\n- `topic_from_history`：历史核心主题或null\n\
          - `has_dependency`：true/false\n- `is_topic_continuation`：true/false\n\n\
          ## \U0001F9EA 反例约束（新增，防偷答）\n以下输出是错误的，禁止出现：\n\n❌ “在禾望电气系统中……可以不填写工时……”\n\
          ❌ 任何业务说明、流程解释、答案内容\n\n正确行为：\n✅ 仅输出JSON结构\n\n## \U0001F4E4 输出格式（严格JSON，无额外文本）（完全保留）\n\
          {\n  \"context_analysis\": {\n    \"original_query\": \"{user_query}\",\n\
          \    \"resolved_query\": \"补全后的完整查询\",\n    \"topic_from_history\": \"历史核心主题或null\"\
          ,\n    \"has_dependency\": true|false,\n    \"is_topic_continuation\": true|false\n\
          \  },\n  \"intent_type\": \"chit_chat|knowledge_query|multi_intent|clarification_needed\"\
          ,\n  \"complexity\": \"simple|complex\",\n  \"retrieval_mode\": \"none|es_recall_only|vector_recall_only\"\
          ,\n  \"primary_kb\": \"主知识库名称（字符串，不可为null）\",\n  \"supporting_kbs\": [\"\
