    - data:
        code: "import json\n\ndef main(selected_knowledge_bases: str, kb_mapping:\
          \ str):\n    # 解析 kb_mapping JSON 字符串为 list\n    try:\n        kb_mapping_list\
          \ = json.loads(kb_mapping)\n    except json.JSONDecodeError as e:\n    \
          \    raise ValueError(\"kb_mapping is not a valid JSON string\") from e\n\
          \n    # 将输入字符串按逗号分割成 ID 列表，并去除空格\n    selected_ids = set(kb.strip() for\
          \ kb in selected_knowledge_bases.split(',') if kb.strip())\n\n    # 构建 ID\
          \ 到 (value, label) 的映射字典\n    kb_dict = {item['id']: (item['value'], item['label'])\
          \ for item in kb_mapping_list}\n\n    fileTypeIds = []  # 实际上是选中的 knowledge\
          \ base IDs\n    kbIds = []        # 对应的 value\n    kbNames = []      # 对应的\
          \ label\n\n    for kb_id in selected_ids:\n        if kb_id in kb_dict:\n\
          \            value, label = kb_dict[kb_id]  # ← 只有两个值！\n            fileTypeIds.append(kb_id)\
          \      # ← ID 就是 kb_id（字典的 key）\n            kbIds.append(value)\n     \
          \       kbNames.append(label)\n        else:\n            print(f\"Warning:\
          \ Knowledge base ID {kb_id} not found in mapping.\")\n\n    return {\n \
          \       \"fileTypeIds\": fileTypeIds,\n        \"kbIds\": kbIds,\n     \
          \   \"kbNames\": kbNames\n    }"
