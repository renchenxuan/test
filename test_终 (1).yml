          \ if sub_supporting.strip() else []\n            except:\n             \
          \   sub_supporting = []\n        if not isinstance(sub_supporting, list):\n\
          \            sub_supporting = []\n        clean_sub = {\n            \"\
          is_chit_chat\": sub.get(\"is_chit_chat\"),\n            \"query_fragment\"\
          : sub.get(\"query_fragment\"),\n            \"intent_scope\": sub.get(\"\
          intent_scope\"),\n            \"retrieval_mode\": sub.get(\"retrieval_mode\"\
