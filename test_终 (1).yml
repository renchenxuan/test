          \        exact_terms = result.get('exact_terms', '')\n        synonyms =\
          \ result.get('synonyms', '')\n        enhanced_query = result.get('enhanced_query',\
          \ '')\n    except Exception:\n        exact_terms = ''\n        synonyms\
          \ = ''\n        enhanced_query = ''\n\n    if enhanced_query and str(enhanced_query).strip():\n\
          \        optimized_query = str(enhanced_query).strip()\n    else:\n    \
          \    parts = [original_query]\n        if exact_terms:\n            parts.append(str(exact_terms).strip())\n\
          \        if synonyms:\n            parts.append(str(synonyms).strip())\n\
          \        optimized_query = ' '.join([p for p in parts if p and str(p).strip()]).strip()\n\
          \n    if not optimized_query:\n        optimized_query = cleaned_query or\
          \ original_query\n\n    return {'text': optimized_query}"
