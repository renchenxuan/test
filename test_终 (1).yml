    - data:
        code: "import json\nimport re\n\n# Evidence selection configuration constants\n\
          MAX_SELECTED_ITEMS = 6      # 最终保留片段总数（建议 5-8）\nMAX_ITEMS_PER_SOURCE = 2\
          \    # 单一来源最多保留片段数，保证多样性（建议 1-3）\nMIN_SNIPPET_LEN = 500       # 截断后片段最小长度（建议\
          \ 400-600）\nMAX_SNIPPET_LEN = 800       # 片段无需截断的最大长度阈值（建议 700-900）\nTARGET_SNIPPET_LEN\
          \ = 700    # 超长片段截断目标长度（建议 500-800，且需介于MIN与MAX之间）\n\n# Evidence quality\
          \ threshold constants\nMIN_EVIDENCE_COUNT = 3      # 判定“证据充分”至少需要的片段数（建议\
          \ 2-5）\nMIN_AVG_SCORE = 3.0         # 判定“证据充分”的平均分下限（建议 2.0-4.0）\n\n# Scoring\
          \ constants\nMAX_TERM_COUNT_WEIGHT = 5    # 单关键词计分次数上限（建议 3-8，越高越偏向重复命中）\n\
          TERM_HIT_MULTIPLIER = 2.0    # 关键词命中计分系数（建议 1.0-3.0，越高越强调精确词）\nMAX_TEXT_LENGTH_FOR_SCORE\
          \ = 800  # 长度计分的长度上限（建议 600-1000，防止超长片段过度加分）\nTEXT_LENGTH_DIVISOR = 400.0\
          \  # 长度得分归一化除数（建议 300-600，越小长度加分越快）\n\nif not (MIN_SNIPPET_LEN <= TARGET_SNIPPET_LEN\
          \ <= MAX_SNIPPET_LEN):\n    raise ValueError('Invalid snippet length config:\
          \ require MIN_SNIPPET_LEN <= TARGET_SNIPPET_LEN <= MAX_SNIPPET_LEN')\n\n\
          def _normalize_items(items, origin):\n    if items is None:\n        return\
          \ []\n    out = []\n    for item in items:\n        if item is None:\n \
          \           continue\n        if isinstance(item, str):\n            text\
          \ = item\n            source = origin\n        elif isinstance(item, dict):\n\
          \            text = ''\n            for k in ['content', 'text', 'chunk',\
          \ 'snippet', 'summary', 'body', 'document', 'page_content']:\n         \
          \       v = item.get(k)\n                if isinstance(v, str) and v.strip():\n\
          \                    text = v\n                    break\n            if\
          \ not text:\n                text = json.dumps(item, ensure_ascii=False)\n\
          \            source = str(\n                item.get('kbName')\n       \
          \         or item.get('kb_name')\n                or item.get('knowledge_base')\n\
          \                or item.get('source')\n                or item.get('source_name')\n\
          \                or item.get('fileName')\n                or item.get('filename')\n\
          \                or item.get('doc_name')\n                or item.get('title')\n\
          \                or origin\n            )\n        else:\n            text\
          \ = str(item)\n            source = origin\n\n        text_norm = re.sub(r'\\\
          s+', ' ', text).strip()\n        if not text_norm:\n            continue\n\
          \        out.append({\n            'origin': origin,\n            'source':\
          \ source,\n            'text': text_norm,\n            'raw': item,\n  \
          \      })\n    return out\n\ndef _extract_terms(query):\n    if not isinstance(query,\
          \ str):\n        return []\n    query = query.strip()\n    if not query:\n\
          \        return []\n\n    terms = []\n    # 故障码/型号样式\n    terms.extend(re.findall(r'[A-Za-z]{1,5}[-_]?[A-Za-z0-9]{2,8}',\
          \ query))\n    # 中文词组（2-8字）\n    terms.extend(re.findall(r'[一-鿿]{2,8}',\
          \ query))\n    # 普通分词（含数字、连字符）\n    terms.extend(re.findall(r'[A-Za-z0-9][A-Za-z0-9\\\
          -_/]{2,}', query))\n\n    uniq = []\n    seen = set()\n    for t in terms:\n\
          \        t = t.strip(\" ,.;:()[]{}\\\"'\")\n        if len(t) < 2:\n   \
          \         continue\n        k = t.lower()\n        if k in seen:\n     \
          \       continue\n        seen.add(k)\n        uniq.append(t)\n    return\
          \ uniq[:12]\n\ndef _truncate_core(text, terms, min_len=MIN_SNIPPET_LEN,\
          \ max_len=MAX_SNIPPET_LEN, target_len=TARGET_SNIPPET_LEN):\n    if len(text)\
          \ <= max_len:\n        return text\n    low = text.lower()\n    if not terms:\n\
          \        return text[:target_len]\n\n    best_start = 0\n    best_cover\
          \ = -1\n    step = max(1, target_len // 6)\n    max_start = max(0, len(text)\
          \ - target_len)\n\n    for start in range(0, max_start + 1, step):\n   \
          \     window = low[start:start + target_len]\n        cover = 0\n      \
          \  for t in terms:\n            if t.lower() in window:\n              \
          \  cover += 1\n        if cover > best_cover:\n            best_cover =\
          \ cover\n            best_start = start\n            if best_cover == len(terms):\n\
          \                break\n\n    end = min(len(text), best_start + target_len)\n\
          \    if end - best_start < min_len:\n        end = min(len(text), best_start\
          \ + min_len)\n    return text[best_start:end]\n\ndef _score_text(text, terms):\n\
          \    if not text:\n        return 0.0, []\n    low = text.lower()\n    hits\
          \ = []\n    score = 0.0\n    for t in terms:\n        c = low.count(t.lower())\n\
          \        if c > 0:\n            hits.append(t)\n            score += min(c,\
          \ MAX_TERM_COUNT_WEIGHT) * TERM_HIT_MULTIPLIER\n    score += min(len(text),\
          \ MAX_TEXT_LENGTH_FOR_SCORE) / TEXT_LENGTH_DIVISOR\n    return score, hits\n\
          \ndef main(arg1: list, arg2: list, arg3: str):\n    primary = _normalize_items(arg1,\
          \ 'primary')\n    supporting = _normalize_items(arg2, 'supporting')\n  \
          \  merged = primary + supporting\n\n    # 去重（跨主辅）\n    deduped = []\n  \
          \  seen = set()\n    for x in merged:\n        k = x['text']\n        if\
          \ k in seen:\n            continue\n        seen.add(k)\n        deduped.append(x)\n\
          \n    terms = _extract_terms(arg3)\n\n    scored = []\n    for x in deduped:\n\
          \        truncated = _truncate_core(x['text'], terms)\n        score, hit_terms\
          \ = _score_text(truncated, terms)\n        item = {\n            'origin':\
          \ x['origin'],\n            'source': x['source'],\n            'text':\
          \ truncated,\n            'score': round(score, 3),\n            'hit_terms':\
          \ hit_terms,\n        }\n        scored.append(item)\n\n    # 关键词加权排序\n\
          \    scored.sort(key=lambda z: (z['score'], len(z['text'])), reverse=True)\n\
          \n    # Top-N + 同源多样性约束（每源最多2段）\n    top_n = MAX_SELECTED_ITEMS\n    source_cap\
          \ = MAX_ITEMS_PER_SOURCE\n    selected = []\n    source_count = {}\n   \
          \ for x in scored:\n        src = x['source']\n        if source_count.get(src,\
          \ 0) >= source_cap:\n            continue\n        selected.append(x)\n\
          \        source_count[src] = source_count.get(src, 0) + 1\n        if len(selected)\
          \ >= top_n:\n            break\n\n    # 若约束后不足N，放宽同源限制补足\n    if len(selected)\
          \ < top_n:\n        selected_keys = {(s['source'], s['text']) for s in selected}\n\
          \        for x in scored:\n            k = (x['source'], x['text'])\n  \
          \          if k in selected_keys:\n                continue\n          \
          \  selected.append(x)\n            selected_keys.add(k)\n            if\
          \ len(selected) >= top_n:\n                break\n\n    avg_score = (sum(x['score']\
          \ for x in selected) / len(selected)) if selected else 0.0\n    hit_terms\
          \ = []\n    hit_seen = set()\n    for x in selected:\n        for t in x.get('hit_terms',\
          \ []):\n            tl = t.lower()\n            if tl not in hit_seen:\n\
          \                hit_seen.add(tl)\n                hit_terms.append(t)\n\
          \n    evidence_level = '证据充分' if (len(selected) >= MIN_EVIDENCE_COUNT and\
          \ avg_score >= MIN_AVG_SCORE) else '证据不足，仅供参考'\n    evidence_score = f\"\
          {avg_score:.2f}\"\n    hit_terms_str = ', '.join(hit_terms[:10]) if hit_terms\
          \ else '无'\n\n    primary_selected = [x for x in selected if x['origin']\
          \ == 'primary']\n    supporting_selected = [x for x in selected if x['origin']\
          \ == 'supporting']\n\n    evidence_pack = (\n        f\"[{evidence_level}]\\\
          n\"\n        f\"evidence_level: {evidence_level}\\n\"\n        f\"evidence_score:\
          \ {evidence_score}\\n\"\n        f\"hit_terms: {hit_terms_str}\\n\"\n  \
          \      f\"top_n: {len(selected)}\\n\"\n        f\"snippets: {json.dumps(selected,\
          \ ensure_ascii=False)}\"\n    )\n\n    return {\n        'output': selected,\n\
          \        'primary_output': json.dumps(primary_selected, ensure_ascii=False),\n\
          \        'supporting_output': json.dumps(supporting_selected, ensure_ascii=False),\n\
          \        'evidence_level': evidence_level,\n        'evidence_score': evidence_score,\n\
          \        'hit_terms': hit_terms_str,\n        'evidence_pack': evidence_pack,\n\
          \    }"
