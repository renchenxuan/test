          : \"子查询文本\",\n      \"is_chit_chat\": true|false,\n      \"intent_scope\"\
          : \"full_document|conceptual_fragment|null\",\n      \"retrieval_mode\"\
          : \"none|es_recall_only|vector_recall_only\",\n      \"primary_kb\": \"\
          非空字符串\",\n      \"supporting_kbs\": [...],\n      \"reason\": \"...\"\n\
          \    }\n  ]\n}\n\n## ❗ 最终强制约束（新增）\n- 只输出JSON\n- 不允许解释\n- 不允许回答问题\n- JSON必须合法\n\
          - 所有primary_kb必须非空\n\n现在，请处理以下查询，并**只输出JSON**：\n用户查询: {user_query}\n\"\"\
          \"\n\n    formatted_prompt = prompt_template.replace(\n        \"{selected_knowledge_bases_clean}\"\
          , selected_kbs_clean\n    ).replace(\"{user_query}\", user_query)\n\n  \
          \  return {\"result\": formatted_prompt}"
