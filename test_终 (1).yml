    - data:
        code: "import json\n\ndef main(llm_output: str, cleaned_query: str, original_query:\
          \ str) -> dict:\n    try:\n        text = llm_output.strip()\n        if\
          \ text.startswith('```'):\n            lines = text.split('\\n')\n     \
