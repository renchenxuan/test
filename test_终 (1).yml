    - data:
        code: "import json\n\ndef main(arg1: list, arg2: list, arg3: list):\n    \"\
          \"\"\n    处理知识库检索结果，保留原始合并结果并提取content内容\n    \n    Args:\n        arg1:\
          \ 主要知识库的检索结果（多个片段）\n        arg2: 辅助知识库1的检索结果（多个片段）\n        arg3: 辅助知识库2的检索结果（多个片段）\n\
          \    \n    Returns:\n        output: 三个列表合并后的完整结果\n        primary_output:\
          \ arg1中所有片段的content合并\n        supporting_output: arg2和arg3中所有片段的content合并\n\
          \        primary_json: arg1的JSON字符串格式\n        supporting_json: arg2+arg3的JSON字符串格式\n\
          \    \"\"\"\n    # 如果传入的是 None，就替换成空列表\n    if arg1 is None:\n        arg1\
          \ = []\n    if arg2 is None:\n        arg2 = []\n    if arg3 is None:\n\
          \        arg3 = []\n    \n    # 合并所有列表（保留原始结构）\n    merged_output = arg1\
          \ + arg2 + arg3\n    \n    # 提取arg1中所有片段的content\n    primary_contents =\
          \ []\n    for item in arg1:\n        if isinstance(item, dict) and 'content'\
          \ in item:\n            primary_contents.append(item['content'])\n    \n\
          \    # 提取arg2和arg3中所有片段的content\n    supporting_contents = []\n    for item\
          \ in arg2 + arg3:  # 合并arg2和arg3再遍历\n        if isinstance(item, dict) and\
          \ 'content' in item:\n            supporting_contents.append(item['content'])\n\
          \    \n    # 将所有content合并，用换行符分隔\n    primary_output = '\\n\\n---\\n\\n'.join(primary_contents)\
          \  # 用分隔符连接\n    supporting_output = '\\n\\n---\\n\\n'.join(supporting_contents)\n\
          \    \n    return {\n        \"output\": merged_output,  # 保留原始合并结果\n  \
          \      \"primary_output\": primary_output,\n        \"supporting_output\"\
          : supporting_output\n    }"
