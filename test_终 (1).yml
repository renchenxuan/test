    - data:
        code: |
          import json
          import re
          
          def main(llm_output: str, cleaned_query: str, original_query: str, retrieval_mode: str) -> dict:
              raw = str(llm_output or '').strip()
              cleaned_query = str(cleaned_query or '').strip()
              original_query = str(original_query or '').strip()
          
              def normalize_json_text(text: str) -> str:
                  t = text.strip()
                  if t.startswith('```'):
                      t = re.sub(r'^```(?:json)?\s*', '', t)
                      t = re.sub(r'\s*```$', '', t)
                  return t.strip()
          
              def try_parse_json(text: str):
                  if not text:
                      return None
                  t = normalize_json_text(text)
                  try:
                      obj = json.loads(t)
                      return obj if isinstance(obj, dict) else None
                  except Exception:
                      pass
                  m = re.search(r'\{[\s\S]*\}', t)
                  if not m:
                      return None
                  try:
                      obj = json.loads(m.group(0))
                      return obj if isinstance(obj, dict) else None
                  except Exception:
                      return None
          
              data = try_parse_json(raw) or {}
              exact_terms = str(data.get('exact_terms', '') or '').strip()
              synonyms = str(data.get('synonyms', '') or '').strip()
              enhanced_query = str(data.get('enhanced_query', '') or '').strip()
          
              if retrieval_mode == 'es_recall_only':
                  parts = []
                  if exact_terms:
                      parts.append(exact_terms)
                  parts.append(cleaned_query or original_query)
                  optimized_query = ' '.join([p for p in parts if p]).strip()
              else:
                  if enhanced_query:
                      optimized_query = enhanced_query
                  else:
                      parts = [cleaned_query or original_query]
                      if exact_terms:
                          parts.append(exact_terms)
                      if synonyms:
                          parts.append(synonyms)
                      optimized_query = ' '.join([p for p in parts if p]).strip()
          
              if not optimized_query:
                  optimized_query = cleaned_query or original_query
          
              return {'optimized_query': optimized_query}
